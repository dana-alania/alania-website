  <body>
    <div class="scan-line" id="scan-line"></div>

      <div class="grid-overlay"></div>

    <main class="bio-page">
      <div class="bio-header">
        <h1 class="main-title">DANA ALANIA</h1>
      </div>
      <section class="os-interface">
        <div class="desktop">
          <div class="icon" data-file="frontend">
            <div class="cyber-icon-box"></div>
            <span>Frontend & Design</span>
          </div>
          <div class="icon" data-file="backend">
            <div class="cyber-icon-box"></div>
            <span>Backend & Database</span>
          </div>
          <div class="icon" data-file="mobile">
            <div class="cyber-icon-box"></div>
            <span>Mobile Development</span>
          </div>
          <div class="icon" data-file="programming">
            <div class="cyber-icon-box"></div>
            <span>PROGRAMMING AND TOOLS</span>
          </div>
          <div class="icon" data-file="certifications">
            <div class="cyber-icon-box"></div>
            <span>CERTIFICATIONS</span>
          </div>
          <div class="icon" data-file="achievements">
            <div class="cyber-icon-box"></div>
            <span>RELEVANT ACHIEVEMENTS</span>
          </div>
          <div class="icon" data-file="education">
            <div class="cyber-icon-box"></div>
            <span>EDUCATIONAL BACKGROUND</span>
          </div>
          <div class="icon" data-file="misc">
            <div class="cyber-icon-box"></div>
            <span>MISCELLANEOUS</span>
          </div>
        </div>

        <div id="os-window" class="window hidden">
          <div class="window-header">
            <span id="window-title">File Viewer</span>
            <div class="window-controls">
              <span class="dot red"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
            </div>
          </div>
          <div class="window-body" id="window-content"></div>

          <div class="window-footer">
            <div class="loading-bar-container">
              <div id="loading-bar-fill"></div>
            </div>
            <span id="loading-percent">0%</span>
          </div>
        </div>
      </section>
    </main>

    <div class="system-hud">
      <div class="hud-item">
        <span class="hud-label">CPU</span>
        <div class="hud-bar"><div id="cpu-fill"></div></div>
      </div>
      <div class="hud-item">
        <span class="hud-label">RAM</span>
        <div class="hud-bar"><div id="ram-fill"></div></div>
      </div>
      <div class="hud-item">
        <span id="os-clock" class="hud-clock">00:00:00</span>
      </div>
    </div>

    <footer class="social-bar">
      <div class="pink-line"></div>
      <div class="social-icons">
        <div

          onclick="copyEmail(this)"
          data-email="yourname@gmail.com"
        >

          <span class="tooltip" id="myTooltip">Copy Email</span>
        </div>
        <a
          href="https://www.linkedin.com/in/dana-alania-8404443b8/"
          target="_blank"
          rel="noopener noreferrer"
          ><i data-lucide="linkedin"></i

          target="_blank"
          rel="noopener noreferrer"
          ><i data-lucide="github"></i
        ></a>
      </div>
